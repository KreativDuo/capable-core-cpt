name: Validate CapCore CPT
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Install PHPStan dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Lint PHP files
        run: find . \( -path './.git' -o -path './vendor' -o -path './node_modules' -o -path './build' -o -path './dist' -o -path './.phpstan' -o -path './includes/advanced-custom-fields' \) -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Run PHPStan
        run: composer phpstan
      - name: Check whitespace errors
        run: |
          if git rev-parse --verify HEAD^ > /dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          fi
